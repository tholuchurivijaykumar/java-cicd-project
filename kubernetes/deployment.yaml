apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-cicd-app
  labels:
    app: java-cicd-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-cicd-app
  template:
    metadata:
      labels:
        app: java-cicd-app
    spec:
      containers:
        - name: java-cicd-app
          image: vijay14082003/java-cicd-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: java-cicd-app-service
spec:
  selector:
    app: java-cicd-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort
